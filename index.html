<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dominik's Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,100..900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/tokens.css" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/mobile-forms.css?v=1" />
</head>
<body class="home-page">
  <div class="wrap">
    <header class="home-head">
      <div class="home-brand">
        <span class="home-eyebrow">Daily command center</span>
        <h1>Dominik's Dashboard</h1>
      </div>
      <span class="home-date" id="today"></span>
    </header>

    <main class="grid" id="grid" aria-label="Dashboard modules"></main>
  </div>

  <script type="module">
    import { MODULE_REGISTRY } from './assets/js/config.js';
    import { budapestToday, ringSVG, setRing, escapeHtml, TZ } from './assets/js/ui.js';

    document.getElementById('today').textContent = new Intl.DateTimeFormat('en-US', {
      timeZone: TZ, year: 'numeric', month: 'long', day: 'numeric', weekday: 'long',
    }).format(new Date());

    document.getElementById('grid').innerHTML = MODULE_REGISTRY.map(tileHTML).join('');

    function tileHTML(m, i) {
      return `<a class="tile tile-${m.size}" href="${m.href}" data-module="${m.id}" style="--tint:${m.tint}" aria-label="Open ${escapeHtml(m.name)}: ${escapeHtml(m.sub)}">
        <span class="tile-top">
          <span class="tile-index">·${String(i + 1).padStart(2, '0')}</span>
          <span class="tile-emoji" aria-hidden="true">${m.emoji}</span>
        </span>
        <span class="tile-live" data-live="${m.id}"></span>
        <span class="tile-foot">
          <span class="tile-name">${escapeHtml(m.name)}</span>
          <span class="tile-sub">${escapeHtml(m.sub)}</span>
          <span class="tile-arrow" aria-hidden="true">→</span>
        </span>
      </a>`;
    }

    enhanceMainTile();
    enhanceHealthTile();

    async function enhanceMainTile() {
      const slot = document.querySelector('[data-live="main"]');
      if (!slot) return;
      try {
        const { supabase } = await import('./assets/js/supabase.js');
        const today = budapestToday();
        const res = await supabase.from('tasks')
          .select('title,done,scheduled_at,sort')
          .eq('for_date', today)
          .order('scheduled_at', { ascending: true, nullsFirst: false })
          .order('sort', { ascending: true });
        const tasks = res.data ?? [];
        const completed = tasks.filter((task) => task.done).length;
        const next = tasks.find((task) => !task.done);
        slot.innerHTML = `
          <span class="mini-ring">
            ${ringSVG(112, 7)}
            <span class="mini-ring-copy" aria-hidden="true">
              <strong>${completed}/${tasks.length}</strong>
              <small>tasks</small>
            </span>
          </span>
          <span class="mini-meta">
            <span class="mini-eyebrow">Up next</span>
            <span class="mini-next">${next ? escapeHtml(next.title) : 'Nothing left today'}</span>
          </span>`;
        slot.setAttribute('aria-label', `${completed} of ${tasks.length} tasks complete. ${next ? `Next: ${next.title}` : 'Nothing left today'}`);
        setRing(slot, tasks.length ? completed / tasks.length : 0);
      } catch {
        /* Supabase not configured or unreachable — the tile stays static. */
      }
    }

    async function enhanceHealthTile() {
      const slot = document.querySelector('[data-live="health"]');
      if (!slot) return;
      try {
        const { supabase } = await import('./assets/js/supabase.js');
        const today = budapestToday();
        const { data, error } = await supabase.from('health_logs')
          .select('sleep_hours,water_glasses,steps').eq('for_date', today).maybeSingle();
        if (error) return;
        const complete = data
          ? Number(data.sleep_hours >= 8) + Number(data.water_glasses >= 8) + Number(data.steps >= 8000)
          : 0;
        const healthDetail = data
          ? `${data.sleep_hours ?? '—'}h · ${(data.steps ?? 0).toLocaleString()} steps`
          : 'Start today’s check-in';
        slot.innerHTML = `
          <span class="health-compact">
            <span class="health-goal-dots" aria-hidden="true">
              ${[0, 1, 2].map((index) => `<i class="${index < complete ? 'is-done' : ''}"></i>`).join('')}
            </span>
            <span class="health-compact-copy">
              <strong>${data ? `${complete} / 3 goals` : 'Check in'}</strong>
              <small>${healthDetail}</small>
            </span>
          </span>`;
        slot.setAttribute('aria-label', data
          ? `${complete} of 3 health goals complete. ${data.sleep_hours ?? 'No'} hours sleep and ${(data.steps ?? 0).toLocaleString()} steps.`
          : 'Start today’s health check-in.');
      } catch {
        /* Supabase not configured or unreachable — the tile stays static. */
      }
    }
  </script>
</body>
</html>
