<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Main · Dominik's Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,100..900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/base.css" />
</head>
<body>
  <div class="wrap">
    <header class="page-head">
      <a class="back" href="../index.html">← Dominik's Dashboard</a>
      <h1>🎯 Main</h1>
      <p class="page-sub">Today's tasks &amp; day progress</p>
    </header>

    <main class="stack">
      <div class="ticker">
        <span class="ticker-dot"></span>
        <span class="ticker-label">Todo</span>
        <span class="ticker-o">○</span>
        <span class="ticker-text" id="ticker-text">–</span>
        <span class="ticker-count" id="ticker-count">–</span>
      </div>

      <section class="card rhythm-card">
        <div class="rhythm-inner">
          <p class="rhythm-eyebrow">Daily rhythm</p>
          <div class="phase-ring-wrap">
            <svg class="phase-ring" viewBox="0 0 200 200" width="220" height="220" aria-hidden="true">
              <circle class="pr-track" cx="100" cy="100" r="90" stroke-width="14"></circle>
              <circle class="pr-arc" id="pr-arc" cx="100" cy="100" r="90" stroke-width="14"
                stroke-dasharray="565.49" stroke-dashoffset="565.49"></circle>
            </svg>
            <div class="pr-center">
              <span class="pr-pct" id="ring-pct">–</span>
              <span class="pr-phase" id="ring-phase"></span>
              <span class="pr-clock" id="ring-time">--:--:--</span>
            </div>
          </div>
          <div class="rhythm-info">
            <div class="rhythm-title">
              <span class="rhythm-icon" id="phase-icon"></span>
              <p id="phase-title">–</p>
            </div>
            <p class="rhythm-remaining" id="meta-remaining">–</p>
            <p class="rhythm-window" id="meta-window">–</p>
          </div>
          <div class="rhythm-dots" id="phase-dots">
            <span></span><span></span><span></span><span></span>
          </div>
        </div>
      </section>

      <div class="section-label"><span class="rule rule-s"></span>TO DO LIST<span class="rule"></span></div>

      <section class="card">
        <div class="today-head">
          <div>
            <p class="today-date" id="today-label">TODAY</p>
            <p class="today-count">
              <span class="count-big" id="count-done">0</span>
              <span class="count-rest">/ <span id="count-total">0</span> complete</span>
            </p>
          </div>
          <button class="btn" id="btn-add" type="button">+ Add task</button>
        </div>
        <div class="seg-bar" id="seg-bar"></div>
        <form class="add-form" id="add-form" hidden>
          <input name="title" id="f-title" placeholder="Task…" required maxlength="200" />
          <input name="category" id="f-category" placeholder="Category" maxlength="40" />
          <input name="time" id="f-time" type="time" />
          <button class="btn" type="submit">Save</button>
          <button class="btn btn-ghost" id="btn-cancel" type="button">Cancel</button>
        </form>
        <ul class="task-list" id="task-list"></ul>
        <div id="empty-slot"></div>
        <p class="status" id="status" role="status"></p>
      </section>

      <div class="section-label"><span class="rule rule-s"></span>PLAN TOMORROW<span class="rule"></span></div>

      <section class="card">
        <div class="today-head">
          <div>
            <p class="today-date" id="tmrw-label">TOMORROW</p>
            <p class="today-count">
              <span class="count-big" id="tmrw-total">0</span>
              <span class="count-rest">planned</span>
            </p>
          </div>
          <button class="btn" id="btn-add-tmrw" type="button">+ Plan task</button>
        </div>
        <form class="add-form" id="add-form-tmrw" hidden>
          <input name="title" id="f2-title" placeholder="Tomorrow's task…" required maxlength="200" />
          <input name="category" id="f2-category" placeholder="Category" maxlength="40" />
          <input name="time" id="f2-time" type="time" />
          <button class="btn" type="submit">Save</button>
          <button class="btn btn-ghost" id="btn-cancel-tmrw" type="button">Cancel</button>
        </form>
        <ul class="task-list" id="task-list-tmrw"></ul>
        <div id="empty-slot-tmrw"></div>
        <p class="status" id="status-tmrw" role="status"></p>
      </section>
    </main>
  </div>

  <script type="module" src="../assets/js/main.js"></script>
</body>
</html>
