<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Main · Life OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,100..900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/base.css" />
</head>
<body>
  <div class="wrap">
    <header class="page-head">
      <a class="back" href="../index.html">← Life OS</a>
      <h1>🎯 Main</h1>
      <p class="page-sub">Today's tasks &amp; day progress</p>
    </header>

    <main class="page-main">
      <section class="card ring-card">
        <div class="ring-wrap">
          <div id="ring-slot"></div>
          <div class="ring-center">
            <span class="ring-time" id="ring-time">--:--</span>
            <span class="ring-pct" id="ring-pct">–</span>
          </div>
        </div>
        <div class="meta-grid">
          <div><span class="meta-label">Ébren</span><span class="meta-value" id="meta-window">–</span></div>
          <div><span class="meta-label">Eltelt</span><span class="meta-value" id="meta-elapsed">–</span></div>
          <div><span class="meta-label">Hátra</span><span class="meta-value" id="meta-remaining">–</span></div>
          <div><span class="meta-label">Kész</span><span class="meta-value" id="meta-done">–</span></div>
        </div>
      </section>

      <section class="card">
        <div class="tasks-head">
          <h2>Mai feladatok</h2>
          <button class="btn" id="btn-add" type="button">+ Add task</button>
        </div>
        <form class="add-form" id="add-form" hidden>
          <input name="title" id="f-title" placeholder="Feladat…" required maxlength="200" />
          <input name="category" id="f-category" placeholder="Kategória" maxlength="40" />
          <input name="time" id="f-time" type="time" />
          <button class="btn" type="submit">Mentés</button>
          <button class="btn btn-ghost" id="btn-cancel" type="button">Mégse</button>
        </form>
        <ul class="task-list" id="task-list"></ul>
        <div id="empty-slot"></div>
        <p class="status" id="status" role="status"></p>
      </section>
    </main>
  </div>

  <script type="module" src="../assets/js/main.js"></script>
</body>
</html>
