<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Main · Life OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,100..900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/base.css" />
</head>
<body>
  <div class="wrap">
    <header class="page-head">
      <a class="back" href="../index.html">← Life OS</a>
      <h1>🎯 Main</h1>
      <p class="page-sub">Today's tasks &amp; day progress</p>
    </header>

    <main class="stack">
      <div class="ticker">
        <span class="ticker-dot"></span>
        <span class="ticker-label">Todo</span>
        <span class="ticker-o">○</span>
        <span class="ticker-text" id="ticker-text">–</span>
        <span class="ticker-count" id="ticker-count">–</span>
      </div>

      <section class="card ring-card">
        <div class="ring-wrap">
          <div id="ring-slot"></div>
          <div class="ring-center">
            <span class="ring-pct-big" id="ring-pct">–</span>
            <span class="ring-phase" id="ring-phase"></span>
            <span class="ring-clock" id="ring-time">--:--</span>
          </div>
        </div>
        <div class="ring-info">
          <p class="phase-title"><span id="phase-emoji">⏳</span> <span id="phase-title">–</span></p>
          <p class="phase-remaining" id="meta-remaining">–</p>
          <p class="phase-window" id="meta-window">–</p>
        </div>
      </section>

      <div class="section-label"><span class="rule rule-s"></span>TO DO LIST<span class="rule"></span></div>

      <section class="card">
        <div class="today-head">
          <div>
            <p class="today-date" id="today-label">TODAY</p>
            <p class="today-count">
              <span class="count-big" id="count-done">0</span>
              <span class="count-rest">/ <span id="count-total">0</span> complete</span>
            </p>
          </div>
          <button class="btn" id="btn-add" type="button">+ Add task</button>
        </div>
        <div class="seg-bar" id="seg-bar"></div>
        <form class="add-form" id="add-form" hidden>
          <input name="title" id="f-title" placeholder="Feladat…" required maxlength="200" />
          <input name="category" id="f-category" placeholder="Kategória" maxlength="40" />
          <input name="time" id="f-time" type="time" />
          <button class="btn" type="submit">Mentés</button>
          <button class="btn btn-ghost" id="btn-cancel" type="button">Mégse</button>
        </form>
        <ul class="task-list" id="task-list"></ul>
        <div id="empty-slot"></div>
        <p class="status" id="status" role="status"></p>
      </section>

      <div class="section-label"><span class="rule rule-s"></span>PLAN TOMORROW<span class="rule"></span></div>

      <section class="card">
        <div class="today-head">
          <div>
            <p class="today-date" id="tmrw-label">TOMORROW</p>
            <p class="today-count">
              <span class="count-big" id="tmrw-total">0</span>
              <span class="count-rest">planned</span>
            </p>
          </div>
          <button class="btn" id="btn-add-tmrw" type="button">+ Plan task</button>
        </div>
        <form class="add-form" id="add-form-tmrw" hidden>
          <input name="title" id="f2-title" placeholder="Holnapi feladat…" required maxlength="200" />
          <input name="category" id="f2-category" placeholder="Kategória" maxlength="40" />
          <input name="time" id="f2-time" type="time" />
          <button class="btn" type="submit">Mentés</button>
          <button class="btn btn-ghost" id="btn-cancel-tmrw" type="button">Mégse</button>
        </form>
        <ul class="task-list" id="task-list-tmrw"></ul>
        <div id="empty-slot-tmrw"></div>
        <p class="status" id="status-tmrw" role="status"></p>
      </section>
    </main>
  </div>

  <script type="module" src="../assets/js/main.js"></script>
</body>
</html>
